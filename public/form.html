<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .form-container {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 540px;
        }
        h2 {
            margin: 0 0 18px;
            text-align: center;
            color: #1f2937;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            color: #374151;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f9fafb;
            font-size: 15px;
            color: #111827;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #4f46e5;
            background-color: #ffffff;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        button {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 10px;
            background-color: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        button:hover:not(:disabled) {
            background-color: #1d4ed8;
        }
        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        .message {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }
        .error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .error-message {
            color: #dc2626;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Submit Your Inquiry</h2>
        <form id="inquiryForm">
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" required>
                <div class="error-message" id="first_name_error"></div>
            </div>
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" required>
                <div class="error-message" id="last_name_error"></div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <div class="error-message" id="email_error"></div>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <div style="display: flex; gap: 8px;">
                    <input type="tel" id="phone" name="phone" required placeholder="03001234567" style="flex: 1;">
                    <button type="button" id="sendOtpBtn" style="padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 8px; background-color: #f3f4f6; color: #374151; cursor: pointer; white-space: nowrap;">Send OTP</button>
                </div>
                <div class="error-message" id="phone_error"></div>
            </div>
            <div class="form-group" id="otpSection" style="display: none;">
                <label for="otp">OTP Verification</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="otp" name="otp" placeholder="Enter 6-digit OTP" maxlength="6" style="flex: 1;">
                    <button type="button" id="verifyOtpBtn" style="padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 8px; background-color: #f3f4f6; color: #374151; cursor: pointer; white-space: nowrap;">Verify</button>
                </div>
                <div class="error-message" id="otp_error"></div>
                <div style="font-size: 12px; color: #6b7280; margin-top: 4px;">OTP sent to your phone number</div>
            </div>
            <div class="form-group">
                <label for="vehicleType">Vehicle Type</label>
                <select id="vehicleType" name="vehicleType" required>
                    <option value="">Select vehicle type</option>
                    <option value="Car">Car</option>
                    <option value="Truck">Truck</option>
                    <option value="Bus">Bus</option>
                    <option value="Bike">Bike</option>
                    <option value="Other">Other</option>
                </select>
                <div class="error-message" id="vehicleType_error"></div>
            </div>
            <div class="form-group">
                <label for="interested_package">Interested Package</label>
                <select id="interested_package" name="interested_package" required>
                    <option value="">Select package</option>
                    <option value="Basic">Basic</option>
                    <option value="Standard">Standard</option>
                    <option value="Premium">Premium</option>
                    <option value="Not Sure">Not Sure</option>
                </select>
                <div class="error-message" id="interested_package_error"></div>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
                <div class="error-message" id="message_error"></div>
            </div>
            <button type="submit" id="submitBtn" disabled>Submit Inquiry</button>
        </form>
        <div class="message" id="responseMessage"></div>
    </div>

    <script>
        document.getElementById('inquiryForm').addEventListener('submit', function (e) {
            e.preventDefault();

            document.querySelectorAll('.error-message').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });
            const responseMessage = document.getElementById('responseMessage');
            responseMessage.style.display = 'none';

            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            data.otp = document.getElementById('otp').value;

            let hasErrors = false;
            if (data.first_name.trim().length < 2) {
                showError('first_name_error', 'First name must be at least 2 characters');
                hasErrors = true;
            }
            if (data.last_name.trim().length < 1) {
                showError('last_name_error', 'Last name is required');
                hasErrors = true;
            }
            if (!isValidEmail(data.email)) {
                showError('email_error', 'Please enter a valid email address');
                hasErrors = true;
            }
            if (!phoneVerified) {
                showError('phone_error', 'Please verify your phone number with OTP first');
                hasErrors = true;
            }
            if (!data.vehicleType) {
                showError('vehicleType_error', 'Please select a vehicle type');
                hasErrors = true;
            }
            if (!data.interested_package) {
                showError('interested_package_error', 'Please select an interested package');
                hasErrors = true;
            }
            if (data.message.trim().length < 10) {
                showError('message_error', 'Message must be at least 10 characters');
                hasErrors = true;
            }

            if (hasErrors) {
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            fetch('/api/inquiries', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
                .then(async response => {
                    const result = await response.json();
                    if (result.success) {
                        showMessage('success', result.message);
                        document.getElementById('inquiryForm').reset();
                    } else if (result.data && result.data.errors) {
                        Object.entries(result.data.errors).forEach(([field, message]) => {
                            const errorElement = document.getElementById(`${field}_error`);
                            if (errorElement) {
                                showError(`${field}_error`, message);
                            }
                        });
                        showMessage('error', result.message || 'Please fix the highlighted errors and try again.');
                    } else {
                        showMessage('error', result.message || 'An error occurred. Please try again.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('error', 'Network error. Please check your connection and try again.');
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Inquiry';
                });
        });

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.style.display = 'block';
        }

        function showMessage(type, message) {
            const el = document.getElementById('responseMessage');
            el.className = `message ${type}`;
            el.textContent = message;
            el.style.display = 'block';
        }

        function isValidEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function isValidPhone(phone) {
            const cleanPhone = phone.replace(/[\s\-\(\)]/g, '');
            return /^(\+92|0)\d{10}$/.test(cleanPhone) || /^\d{11}$/.test(cleanPhone);
        }

        // OTP functionality
        let phoneVerified = false;

        document.getElementById('sendOtpBtn').addEventListener('click', function() {
            const phone = document.getElementById('phone').value.trim();
            const phoneError = document.getElementById('phone_error');

            phoneError.style.display = 'none';
            phoneError.textContent = '';

            if (!phone) {
                showError('phone_error', 'Phone number is required');
                return;
            }

            if (!isValidPhone(phone)) {
                showError('phone_error', 'Please enter a valid 11-digit phone number (e.g. 03001234567)');
                return;
            }

            const sendOtpBtn = document.getElementById('sendOtpBtn');
            sendOtpBtn.disabled = true;
            sendOtpBtn.textContent = 'Sending...';

            fetch('/api/send-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ phone: phone })
            })
                .then(async response => {
                    const result = await response.json();
                    if (result.success) {
                        document.getElementById('otpSection').style.display = 'block';
                        showMessage('success', 'OTP sent to your phone number');
                    } else {
                        showMessage('error', result.message || 'Failed to send OTP');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('error', 'Network error. Please try again.');
                })
                .finally(() => {
                    sendOtpBtn.disabled = false;
                    sendOtpBtn.textContent = 'Send OTP';
                });
        });

        document.getElementById('verifyOtpBtn').addEventListener('click', function() {
            const phone = document.getElementById('phone').value.trim();
            const otp = document.getElementById('otp').value.trim();
            const otpError = document.getElementById('otp_error');

            otpError.style.display = 'none';
            otpError.textContent = '';

            if (!otp || otp.length !== 6) {
                showError('otp_error', 'Please enter a valid 6-digit OTP');
                return;
            }

            const verifyOtpBtn = document.getElementById('verifyOtpBtn');
            verifyOtpBtn.disabled = true;
            verifyOtpBtn.textContent = 'Verifying...';

            fetch('/api/verify-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ phone: phone, otp: otp })
            })
                .then(async response => {
                    const result = await response.json();
                    if (result.success) {
                        phoneVerified = true;
                        document.getElementById('submitBtn').disabled = false;
                        document.getElementById('otpSection').style.display = 'none';
                        showMessage('success', 'Phone number verified successfully');
                    } else {
                        showMessage('error', result.message || 'Invalid OTP');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('error', 'Network error. Please try again.');
                })
                .finally(() => {
                    verifyOtpBtn.disabled = false;
                    verifyOtpBtn.textContent = 'Verify';
                });
        });

        // Reset verification when phone changes
        document.getElementById('phone').addEventListener('input', function() {
            phoneVerified = false;
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('otpSection').style.display = 'none';
            document.getElementById('otp').value = '';
        });
    </script>
</body>
</html>
